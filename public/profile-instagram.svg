<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0F1A14"/>
      <stop offset="100%" stop-color="#0B0B0B"/>
    </radialGradient>

    <!-- Green glow behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>

    <!-- Icon shadow -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.2" fill="#FFFFFF" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bgGlow)"/>

  <!-- Dot grid overlay -->
  <rect width="1080" height="1080" fill="url(#dots)"/>

  <!-- Green glow halo -->
  <ellipse cx="540" cy="490" rx="280" ry="260" fill="url(#iconGlow)"/>

  <!-- Icon container: rounded square -->
  <rect x="340" y="290" width="400" height="400" rx="88" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Icon: two wave lines (from the site logo) -->
  <!-- Top wave -->
  <path
    d="M420 450 L490 380 L560 450 L630 380"
    stroke="#FFFFFF"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#softGlow)"
  />
  <!-- Bottom wave (green, offset) -->
  <path
    d="M420 520 L490 450 L560 520 L630 450"
    stroke="#10B981"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"
    filter="url(#softGlow)"
  />

  <!-- Brand name: Nextflow -->
  <text
    x="540"
    y="790"
    text-anchor="middle"
    font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="72"
    letter-spacing="-3"
    fill="#FFFFFF"
  >Nextflow</text>

  <!-- .ai suffix in green -->
  <text
    x="540"
    y="868"
    text-anchor="middle"
    font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif"
    font-weight="600"
    font-size="38"
    letter-spacing="6"
    fill="#10B981"
    opacity="0.9"
  >.ai</text>

  <!-- Subtle bottom line accent -->
  <line x1="480" y1="900" x2="600" y2="900" stroke="#10B981" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
