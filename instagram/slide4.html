<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 4 — CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #F5C518;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #F5C518;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 96px;
    overflow: hidden;
    text-align: center;
  }

  /* Dot grid on yellow */
  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.07) 1.5px, transparent 1.5px);
    background-size: 36px 36px;
    pointer-events: none;
  }

  /* Dark blobs */
  .blob-br {
    position: absolute;
    bottom: -120px; right: -120px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: rgba(16,185,129,0.18);
    pointer-events: none;
  }
  .blob-tl {
    position: absolute;
    top: -80px; left: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: rgba(0,0,0,0.06);
    pointer-events: none;
  }

  /* Overlay vignette at bottom for brand */
  .vignette-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.06));
    pointer-events: none;
  }

  .slide-num {
    position: absolute;
    top: 52px; right: 60px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(0,0,0,0.25);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Content */
  .content { position: relative; z-index: 10; width: 100%; max-width: 820px; }

  /* Social proof badge */
  .proof-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    background: rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 100px;
    margin-bottom: 48px;
  }
  .proof-avatars {
    display: flex;
  }
  .proof-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid #F5C518;
    margin-left: -8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
  }
  .proof-avatar:first-child { margin-left: 0; }
  .proof-text {
    font-size: 14px;
    font-weight: 700;
    color: rgba(0,0,0,0.55);
    letter-spacing: -0.01em;
  }
  .proof-text strong { color: #0B0B0B; }

  /* Headline */
  .headline {
    font-size: 84px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.05em;
    color: #0B0B0B;
    margin-bottom: 36px;
  }
  .headline .underline-green {
    text-decoration: underline;
    text-decoration-color: #10B981;
    text-decoration-thickness: 6px;
    text-underline-offset: 10px;
  }

  /* Sub */
  .subtext {
    font-size: 22px;
    font-weight: 600;
    color: rgba(0,0,0,0.5);
    letter-spacing: -0.02em;
    line-height: 1.5;
    margin-bottom: 56px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  /* CTA button */
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 26px 56px;
    background: #0B0B0B;
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.02em;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    margin-bottom: 36px;
    cursor: pointer;
    text-decoration: none;
  }
  .cta-arrow {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.3);
    display: flex; align-items: center; justify-content: center;
  }

  /* Trust badges */
  .trust-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    margin-bottom: 0;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(0,0,0,0.42);
    letter-spacing: -0.01em;
  }
  .trust-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Separator */
  .separator {
    width: 400px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.12), rgba(16,185,129,0.4), rgba(0,0,0,0.12), transparent);
    margin: 0 auto 40px;
    border-radius: 2px;
  }

  /* Brand */
  .brand {
    position: absolute;
    bottom: 52px; left: 96px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-icon {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name {
    font-size: 17px;
    font-weight: 900;
    color: #0B0B0B;
    letter-spacing: -0.03em;
  }
  .brand-name span { color: #059669; }

  /* Slide counter */
  .slide-end {
    position: absolute;
    bottom: 58px; right: 96px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(0,0,0,0.28);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="dot-grid"></div>
  <div class="blob-br"></div>
  <div class="blob-tl"></div>
  <div class="vignette-bottom"></div>
  <div class="slide-num">04 / 04</div>

  <div class="content">
    <!-- Social proof -->
    <div class="proof-badge">
      <div class="proof-avatars">
        <div class="proof-avatar" style="background:#10B981">AR</div>
        <div class="proof-avatar" style="background:#3B82F6">MC</div>
        <div class="proof-avatar" style="background:#8B5CF6">DP</div>
        <div class="proof-avatar" style="background:#EF4444">IL</div>
        <div class="proof-avatar" style="background:#F59E0B">SB</div>
      </div>
      <div class="proof-text"><strong>50+ afaceri</strong> automatizate în România</div>
    </div>

    <h2 class="headline">
      Tu ești<br>
      <span class="underline-green">următor?</span>
    </h2>

    <p class="subtext">
      Îți arătăm exact cum ar arăta la tine.<br>
      Gratuit. Fără angajament. În 30 de minute.
    </p>

    <div class="separator"></div>

    <a class="cta-btn">
      Demo Gratuit →
      <div class="cta-arrow">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8H13M9 4L13 8L9 12" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <div class="trust-row">
      <div class="trust-item">
        <div class="trust-check">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 5.5L4 7.5L8 3" stroke="rgba(0,0,0,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        Fără angajament
      </div>
      <div class="trust-item">
        <div class="trust-check">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 5.5L4 7.5L8 3" stroke="rgba(0,0,0,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        Call gratuit 30 min
      </div>
      <div class="trust-item">
        <div class="trust-check">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 5.5L4 7.5L8 3" stroke="rgba(0,0,0,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        Rezultate în săptămâni
      </div>
    </div>
  </div>

  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 9L6.5 4.5L11 9L15.5 4.5" stroke="#059669" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 13.5L6.5 9L11 13.5L15.5 9" stroke="#0B0B0B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      </svg>
    </div>
    <div class="brand-name">Nextflow<span>.ai</span></div>
  </div>

  <div class="slide-end">link în bio ↑</div>
</div>
</body>
</html>
