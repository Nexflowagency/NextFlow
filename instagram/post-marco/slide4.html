<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Post Marco — Slide 4 · CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px;
    overflow: hidden; background: #0B0B0B;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .slide {
    width: 1080px; height: 1080px;
    position: relative;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 96px; overflow: hidden; text-align: center;
  }

  .dot-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1.5px, transparent 1.5px);
    background-size: 36px 36px; pointer-events: none;
  }
  .glow-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 700px;
    background: radial-gradient(ellipse, rgba(16,185,129,0.09) 0%, transparent 60%);
    pointer-events: none;
  }

  .slide-num {
    position: absolute; top: 52px; right: 60px;
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.18); letter-spacing: 0.08em; text-transform: uppercase;
  }

  .brand {
    position: absolute; bottom: 60px; left: 96px;
    display: flex; align-items: center; gap: 12px;
  }
  .brand-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.28);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.03em; }
  .brand-name span { color: #10B981; }

  .handle {
    position: absolute; bottom: 68px; right: 96px;
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.2); letter-spacing: -0.01em;
  }

  .content { position: relative; z-index: 10; max-width: 800px; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    margin-bottom: 44px; padding: 8px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
  }

  .headline {
    font-size: 76px; font-weight: 900;
    line-height: 1.0; letter-spacing: -0.05em;
    color: #fff; margin-bottom: 28px;
  }
  .headline .green { color: #10B981; }

  .sub {
    font-size: 26px; font-weight: 600;
    color: rgba(255,255,255,0.36); letter-spacing: -0.02em;
    line-height: 1.5; margin-bottom: 56px;
  }

  .trust-badges {
    display: flex; justify-content: center; gap: 20px; margin-bottom: 52px;
    flex-wrap: wrap;
  }
  .badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    padding: 10px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    letter-spacing: -0.01em;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #10B981; }

  .cta-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: #10B981; color: #0B0B0B;
    font-size: 24px; font-weight: 900;
    padding: 22px 56px; border-radius: 100px;
    letter-spacing: -0.02em; margin-bottom: 16px;
  }

  .cta-under {
    font-size: 16px; font-weight: 600;
    color: rgba(255,255,255,0.22); letter-spacing: 0.01em;
  }

  .divider {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, #10B981, #F5C518);
    border-radius: 2px; margin: 0 auto 48px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="dot-grid"></div>
  <div class="glow-center"></div>

  <div class="slide-num">04 / 04</div>

  <div class="content">
    <div class="eyebrow">Următorul ești tu?</div>

    <h2 class="headline">
      Și afacerea ta<br>
      poate arăta <span class="green">la fel.</span>
    </h2>

    <div class="divider"></div>

    <p class="sub">
      Fără cod. Fără personal extra.<br>Fără haos.
    </p>

    <div class="trust-badges">
      <div class="badge"><span class="badge-dot"></span> Fără angajament</div>
      <div class="badge"><span class="badge-dot"></span> Demo gratuit 30 min</div>
      <div class="badge"><span class="badge-dot"></span> Rezultate în săptămâni</div>
    </div>

    <div class="cta-btn">
      Demo Gratuit → Link în bio ↑
    </div>
    <div class="cta-under">hello@nextflow.ai · @nextflow.ai</div>
  </div>

  <div class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <path d="M2 9L6.5 4.5L11 9L15.5 4.5" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 13.5L6.5 9L11 13.5L15.5 9" stroke="#F5C518" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </svg>
    </div>
    <div class="brand-name">Nextflow<span>.ai</span></div>
  </div>

  <div class="handle">@nextflow.ai</div>
</div>
</body>
</html>
