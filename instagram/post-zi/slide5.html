<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Post Zi — Slide 5 · CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px;
    overflow: hidden; background: #0B0B0B;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .slide {
    width: 1080px; height: 1080px;
    position: relative;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 96px; overflow: hidden;
    text-align: center;
  }

  .dot-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1.5px, transparent 1.5px);
    background-size: 36px 36px; pointer-events: none;
  }
  .glow-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 700px;
    background: radial-gradient(ellipse, rgba(16,185,129,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .slide-num {
    position: absolute; top: 52px; right: 60px;
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.18); letter-spacing: 0.08em; text-transform: uppercase;
  }

  .brand {
    position: absolute; bottom: 60px; left: 96px;
    display: flex; align-items: center; gap: 12px;
  }
  .brand-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.28);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.03em; }
  .brand-name span { color: #10B981; }

  .handle {
    position: absolute; bottom: 68px; right: 96px;
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.2); letter-spacing: -0.01em;
  }

  .content { position: relative; z-index: 10; max-width: 780px; }

  .avatars {
    display: flex; justify-content: center; margin-bottom: 32px; gap: 0;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    border: 3px solid #0B0B0B;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; color: #fff;
    margin-left: -10px; letter-spacing: -0.03em;
  }
  .avatar:first-child { margin-left: 0; }
  .av1 { background: #10B981; }
  .av2 { background: #6366F1; }
  .av3 { background: #F59E0B; }
  .av4 { background: #EC4899; }
  .av5 { background: #3B82F6; }
  .av-more {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.15);
    font-size: 13px; color: rgba(255,255,255,0.55);
  }

  .social-proof-text {
    font-size: 15px; font-weight: 700; letter-spacing: 0.04em;
    text-transform: uppercase; color: rgba(255,255,255,0.3);
    margin-bottom: 52px;
  }
  .social-proof-text span { color: #10B981; }

  .headline {
    font-size: 72px; font-weight: 900;
    line-height: 1.0; letter-spacing: -0.05em;
    color: #fff; margin-bottom: 20px;
  }
  .headline .green { color: #10B981; }

  .sub {
    font-size: 26px; font-weight: 600;
    color: rgba(255,255,255,0.38); letter-spacing: -0.02em;
    line-height: 1.5; margin-bottom: 64px;
  }
  .sub strong { color: rgba(255,255,255,0.7); }

  .stats {
    display: flex; justify-content: center; gap: 40px; margin-bottom: 56px;
  }
  .stat { text-align: center; }
  .stat-num {
    font-size: 40px; font-weight: 900; letter-spacing: -0.04em;
    color: #fff; line-height: 1;
  }
  .stat-num .unit { font-size: 26px; color: #10B981; }
  .stat-label {
    font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: rgba(255,255,255,0.3); margin-top: 4px;
  }

  .stat-divider {
    width: 1px; background: rgba(255,255,255,0.1); align-self: stretch;
  }

  .cta-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: #10B981; color: #0B0B0B;
    font-size: 22px; font-weight: 900;
    padding: 20px 52px; border-radius: 100px;
    letter-spacing: -0.02em;
  }
  .cta-sub {
    margin-top: 20px;
    font-size: 16px; font-weight: 600;
    color: rgba(255,255,255,0.22); letter-spacing: 0.01em;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="dot-grid"></div>
  <div class="glow-center"></div>

  <div class="slide-num">05 / 05</div>

  <div class="content">
    <div class="avatars">
      <div class="avatar av1">AR</div>
      <div class="avatar av2">MC</div>
      <div class="avatar av3">DP</div>
      <div class="avatar av4">IL</div>
      <div class="avatar av5">SB</div>
      <div class="avatar av-more">+45</div>
    </div>
    <div class="social-proof-text"><span>50+</span> afaceri au scăpat de această zi</div>

    <h2 class="headline">
      Vrei să lucrezi<br>
      <span class="green">mai puțin?</span>
    </h2>

    <p class="sub">
      Fără să pierzi clienți.<br>
      <strong>Fără să angajezi mai mult.</strong>
    </p>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">30<span class="unit"> min</span></div>
        <div class="stat-label">Demo gratuit</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">2<span class="unit"> săpt.</span></div>
        <div class="stat-label">Rezultate</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num">0<span class="unit"> €</span></div>
        <div class="stat-label">Angajament</div>
      </div>
    </div>

    <div class="cta-btn">
      Demo Gratuit → Link în bio ↑
    </div>
    <div class="cta-sub">hello@nextflow.ai</div>
  </div>

  <div class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <path d="M2 9L6.5 4.5L11 9L15.5 4.5" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 13.5L6.5 9L11 13.5L15.5 9" stroke="#F5C518" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </svg>
    </div>
    <div class="brand-name">Nextflow<span>.ai</span></div>
  </div>

  <div class="handle">@nextflow.ai</div>
</div>
</body>
</html>
