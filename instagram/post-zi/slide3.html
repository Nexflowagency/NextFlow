<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Post Zi — Slide 3 · După-amiaza</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px;
    overflow: hidden; background: #0B0B0B;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .slide {
    width: 1080px; height: 1080px;
    position: relative;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 88px 96px; overflow: hidden;
  }

  .dot-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1.5px, transparent 1.5px);
    background-size: 36px 36px; pointer-events: none;
  }
  .glow-center {
    position: absolute; top: 40%; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(ellipse, rgba(239,68,68,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .slide-num {
    position: absolute; top: 52px; right: 60px;
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.18); letter-spacing: 0.08em; text-transform: uppercase;
  }

  .brand {
    position: absolute; bottom: 60px; left: 96px;
    display: flex; align-items: center; gap: 12px;
  }
  .brand-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.28);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.03em; }
  .brand-name span { color: #10B981; }

  .swipe-hint {
    position: absolute; bottom: 60px; right: 96px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.22); letter-spacing: 0.04em;
  }
  .swipe-arrow {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.14);
    display: flex; align-items: center; justify-content: center;
  }

  .content { position: relative; z-index: 10; width: 100%; }

  .time-badge {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: rgba(239,68,68,0.8);
    margin-bottom: 32px; padding: 8px 18px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 100px;
  }

  .headline {
    font-size: 58px; font-weight: 900;
    line-height: 1.05; letter-spacing: -0.04em;
    color: #fff; margin-bottom: 44px;
  }
  .headline .dim { color: rgba(255,255,255,0.35); }

  .todo-list { display: flex; flex-direction: column; gap: 18px; margin-bottom: 44px; }

  .todo-item {
    display: flex; align-items: center; gap: 20px;
    padding: 22px 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
  }

  .todo-check {
    width: 28px; height: 28px; border-radius: 8px;
    border: 2px solid rgba(239,68,68,0.4);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }

  .todo-label {
    flex: 1; font-size: 22px; font-weight: 700;
    color: rgba(255,255,255,0.65); letter-spacing: -0.02em;
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.15);
  }

  .todo-defer {
    font-size: 16px; font-weight: 700;
    color: rgba(239,68,68,0.6); letter-spacing: -0.01em;
    background: rgba(239,68,68,0.08); border-radius: 8px;
    padding: 4px 12px; flex-shrink: 0;
  }

  .conclusion {
    font-size: 24px; font-weight: 700;
    color: rgba(255,255,255,0.45);
    border-left: 3px solid rgba(239,68,68,0.5);
    padding-left: 20px; line-height: 1.4;
  }
  .conclusion strong { color: #fff; }
</style>
</head>
<body>
<div class="slide">
  <div class="dot-grid"></div>
  <div class="glow-center"></div>

  <div class="slide-num">03 / 05</div>

  <div class="content">
    <div class="time-badge">🔥 Orele 14:00 — 18:00</div>

    <h2 class="headline">
      Lista de azi<br>
      <span class="dim">devine lista de mâine.</span>
    </h2>

    <div class="todo-list">
      <div class="todo-item">
        <div class="todo-check"></div>
        <div class="todo-label">Follow-up trimis</div>
        <div class="todo-defer">Mâine</div>
      </div>
      <div class="todo-item">
        <div class="todo-check"></div>
        <div class="todo-label">CRM actualizat</div>
        <div class="todo-defer">Vineri</div>
      </div>
      <div class="todo-item">
        <div class="todo-check"></div>
        <div class="todo-label">Raport generat</div>
        <div class="todo-defer">Weekend</div>
      </div>
      <div class="todo-item">
        <div class="todo-check"></div>
        <div class="todo-label">Propunere trimisă</div>
        <div class="todo-defer">Dacă am timp</div>
      </div>
    </div>

    <p class="conclusion">
      Ai rezolvat urgențele.<br>
      <strong>N-ai atins prioritățile.</strong><br>
      Mâine nu vine niciodată.
    </p>
  </div>

  <div class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <path d="M2 9L6.5 4.5L11 9L15.5 4.5" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 13.5L6.5 9L11 13.5L15.5 9" stroke="#F5C518" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </svg>
    </div>
    <div class="brand-name">Nextflow<span>.ai</span></div>
  </div>

  <div class="swipe-hint">
    SWIPE
    <div class="swipe-arrow">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 7H11M7.5 4L11 7L7.5 10" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
