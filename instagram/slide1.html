<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 1 — Hook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0B0B0B;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: #0B0B0B;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 96px;
    overflow: hidden;
  }

  /* Dot grid */
  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1.5px, transparent 1.5px);
    background-size: 36px 36px;
    pointer-events: none;
  }

  /* Ambient glows */
  .glow-tl {
    position: absolute;
    top: -200px; left: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(ellipse at top left, rgba(16,185,129,0.13) 0%, transparent 60%);
    pointer-events: none;
  }
  .glow-br {
    position: absolute;
    bottom: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(ellipse at bottom right, rgba(245,197,24,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .glow-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 600px;
    background: radial-gradient(ellipse at center, rgba(16,185,129,0.04) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Slide number badge */
  .slide-num {
    position: absolute;
    top: 52px; right: 60px;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Brand */
  .brand {
    position: absolute;
    bottom: 60px; left: 96px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.03em;
  }
  .brand-name span { color: #10B981; }

  /* Main content */
  .content { position: relative; z-index: 10; }

  /* Eyebrow */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #10B981;
    margin-bottom: 48px;
    padding: 8px 18px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.22);
    border-radius: 100px;
  }
  .eyebrow-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #10B981;
    box-shadow: 0 0 0 3px rgba(16,185,129,0.25);
  }

  /* Headline */
  .headline {
    font-size: 108px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.05em;
    color: #fff;
    margin-bottom: 0;
  }
  .headline .yellow { color: #F5C518; }
  .headline .dim { color: rgba(255,255,255,0.35); font-size: 72px; font-weight: 700; }

  /* Sub line */
  .subline {
    margin-top: 52px;
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.42);
    letter-spacing: -0.02em;
    line-height: 1.5;
    max-width: 580px;
  }
  .subline strong { color: #fff; font-weight: 700; }

  /* Accent line */
  .accent-line {
    margin-top: 60px;
    width: 80px; height: 4px;
    background: linear-gradient(90deg, #F5C518, #10B981);
    border-radius: 2px;
  }

  /* Swipe hint */
  .swipe-hint {
    position: absolute;
    bottom: 60px;
    right: 96px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.04em;
  }
  .swipe-arrow {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="dot-grid"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="glow-center"></div>

  <div class="slide-num">01 / 04</div>

  <div class="content">
    <div class="eyebrow">
      <span class="eyebrow-dot"></span>
      Automatizare AI · România
    </div>

    <h1 class="headline">
      Ai pierdut<br>
      <span class="yellow">3 clienți</span><br>
      azi.
    </h1>

    <p class="subline">
      <strong>Nu știi care.</strong><br>
      Și nici nu vei afla — pentru că<br>n-ai sistem care să-i prindă.
    </p>

    <div class="accent-line"></div>
  </div>

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none">
        <path d="M2 9L6.5 4.5L11 9L15.5 4.5" stroke="#10B981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 13.5L6.5 9L11 13.5L15.5 9" stroke="#F5C518" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </svg>
    </div>
    <div class="brand-name">Nextflow<span>.ai</span></div>
  </div>

  <!-- Swipe hint -->
  <div class="swipe-hint">
    SWIPE
    <div class="swipe-arrow">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 7H11M7.5 4L11 7L7.5 10" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
