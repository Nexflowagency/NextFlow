<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px;
    overflow: hidden; background: #0B0B0B;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .slide {
    width: 1080px; height: 1080px;
    position: relative;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 96px; overflow: hidden;
  }

  .dot-grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1.5px, transparent 1.5px);
    background-size: 36px 36px; pointer-events: none;
  }
  .glow-top {
    position: absolute; top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.07) 0%, transparent 60%);
    pointer-events: none;
  }
  .glow-bottom {
    position: absolute; bottom: -150px; left: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(16,185,129,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .brand {
    position: absolute; bottom: 60px; left: 96px;
    display: flex; align-items: center; gap: 12px;
  }
  .brand-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.28);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: -0.03em; }
  .brand-name span { color: #10B981; }

  .cta-pill {
    position: absolute; bottom: 66px; right: 96px;
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.28);
    border-radius: 100px;
    padding: 10px 24px;
    font-size: 15px; font-weight: 700; color: #10B981;
    letter-spacing: -0.01em;
  }

  .content { position: relative; z-index: 10; }

  .clock {
    font-size: 130px; font-weight: 900;
    line-height: 1; letter-spacing: -0.06em;
    color: rgba(255,255,255,0.07);
    margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }

  .hook-line {
    font-size: 32px; font-weight: 600;
    color: rgba(255,255,255,0.38); letter-spacing: -0.02em;
    margin-bottom: 24px; line-height: 1.3;
  }
  .hook-line em { color: rgba(255,255,255,0.65); font-style: normal; }

  .main-statement {
    font-size: 82px; font-weight: 900;
    line-height: 0.95; letter-spacing: -0.05em;
    color: #fff; margin-bottom: 20px;
  }

  .counter-statement {
    font-size: 82px; font-weight: 900;
    line-height: 0.95; letter-spacing: -0.05em;
    color: rgba(255,255,255,0.2); margin-bottom: 52px;
  }
  .counter-statement .highlight { color: #F5C518; }

  .separator {
    width: 64px; height: 3px;
    background: linear-gradient(90deg, #10B981, rgba(16,185,129,0.2));
    border-radius: 2px; margin-bottom: 44px;
  }

  .conclusion {
    font-size: 26px; font-weight: 600;
    color: rgba(255,255,255,0.4); letter-spacing: -0.02em;
    line-height: 1.5; max-width: 600px;
  }
  .conclusion strong { color: rgba(255,255,255,0.75); font-weight: 800; }
</style>
</head>
<body>
<div class="slide">
